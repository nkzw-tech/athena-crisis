packages:
  - apollo
  - ares
  - art
  - artemis
  - athena
  - codegen
  - deimos
  - dionysus
  - docs
  - eslint-plugin
  - fixtures
  - hera
  - hermes
  - i18n
  - offline
  - scripts
  - tests
  - ui
  - zeus

allowBuilds:
  '@firebase/util': false
  '@playwright/browser-chromium': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  bufferutil: true
  canvas: false
  esbuild: true
  farmhash: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
  utf-8-validate: true

ignorePatchFailures: false

overrides:
  react@^18.0.0: 19.0.0-rc.1
  rollup@^2.0.0: ^4.16.4

patchedDependencies:
  cordova-plugin-purchase: patches/cordova-plugin-purchase.patch
  howler: patches/howler.patch
  require-in-the-middle: patches/require-in-the-middle.patch

peerDependencyRules:
  allowAny:
    - '@aws-sdk/client-sso-oidc'
    - react
    - react-dom
    - utf-8-validate
